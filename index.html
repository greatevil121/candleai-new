# candleai-new
<!DOCTYPE html>
<html>
<head>
  <title>Smart Trading Dashboard</title>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    .box{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    h1{
      text-align:center;
      color:#38bdf8;
    }

    .buy{color:#22c55e;}
    .sell{color:#ef4444;}
    .wait{color:#fbbf24;}
  </style>
</head>

<body>

<div class="container">

  <h1>📊 Smart Trading Dashboard</h1>

  <!-- LIVE CHART -->
  <div class="box">
    <h2>📈 Live Chart</h2>

    <div id="tradingview_chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
      new TradingView.widget({
        "width": "100%",
        "height": 450,
        "symbol": "NSE:NIFTY",
        "interval": "5",
        "timezone": "Asia/Kolkata",
        "theme": "dark",
        "style": "1",
        "container_id": "tradingview_chart"
      });
    </script>

  </div>

  <!-- ANALYSIS -->
  <div class="box" id="analysisBox">
    <h2>🧠 Smart Decision AI</h2>
  </div>

</div>

<script>
  // 🧠 LOGIC ENGINE
  let trend = "UPTREND";
  let pattern = "HAMMER";

  let score = 0;

  if(trend === "UPTREND") score += 50;
  else score += 20;

  if(pattern === "HAMMER") score += 30;
  else score += 10;

  score += Math.floor(Math.random() * 20);

  let buy = score;
  let sell = 100 - score;

  let decision = "";

  if(score >= 70){
    decision = "STRONG BUY 📈";
  } 
  else if(score >= 50){
    decision = "BUY 📊";
  } 
  else if(score >= 40){
    decision = "WAIT ⏳";
  } 
  else {
    decision = "SELL 📉";
  }

  document.getElementById("analysisBox").innerHTML = `
    <p>📊 Trend: ${trend}</p>
    <p>🔨 Pattern: ${pattern}</p>
    <hr>
    <p class="buy">📈 Buy Confidence: ${buy}%</p>
    <p class="sell">📉 Sell Confidence: ${sell}%</p>
    <hr>
    <h3 class="wait">💡 Decision: ${decision}</h3>
  `;
</script>

</body>
</html>

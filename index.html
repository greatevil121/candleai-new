# candleai-new
<!DOCTYPE html>
<html>
<head>
  <title>Smart Trading Dashboard</title>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .box{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .buy{color:#22c55e;}
    .sell{color:#ef4444;}
    .title{color:#38bdf8;}
  </style>
</head>

<body>

<div class="container">

  <h1 class="title">📊 Smart Trading Dashboard</h1>

  <!-- LIVE CHART -->
  <div class="box">
    <h2>📈 Live Chart</h2>
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=NSE:NIFTY&interval=5"
      width="100%" 
      height="400"
      style="border:none;">
    </iframe>
  </div>

  <!-- ANALYSIS BOX -->
  <div class="box">
    <h2>🧠 Smart Pattern Analysis</h2>

    <p>📊 Trend: <b>UPTREND 📈</b></p>
    <p>🔨 Pattern: <b>Hammer</b></p>

    <hr>

    <p class="buy">📈 Buy Confidence: 70%</p>
    <p class="sell">📉 Sell Confidence: 30%</p>

    <hr>

    <p>💡 Advice: Dip pe entry le, stop loss low ke niche</p>
  </div>

</div>

</body>
</html>
